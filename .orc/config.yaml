name: orc
ticket-pattern: 'R-\d+'
model: opus
effort: high

default-allow-tools:
  - Bash

phases:
  - name: bead-claim
    type: script
    description: Mark the ticket's bead as in-progress
    run: |
      bd search "$TICKET" | grep " - $TICKET:" | head -1 | cut -d' ' -f1 | xargs -r -I{} bd update {} --status=in_progress
      exit 0
    timeout: 1

  - name: plan
    type: agent
    description: Read the roadmap item and produce an implementation plan
    prompt: .orc/phases/plan.md
    timeout: 15
    outputs:
      - plan.md

  - name: review-plan
    type: agent
    description: Review the plan for completeness and correctness
    prompt: .orc/phases/review-plan.md
    timeout: 10
    outputs:
      - plan-review.md

  - name: plan-check
    type: script
    description: Check if plan review passed
    run: test -f $ARTIFACTS_DIR/plan-approved.txt || { cat $ARTIFACTS_DIR/plan-review.md 2>/dev/null; exit 1; }
    timeout: 1
    on-fail:
      goto: plan
      max: 2

  - name: implement
    type: agent
    description: Implement the changes following the plan
    prompt: .orc/phases/implement.md
    timeout: 30

  - name: test
    type: script
    description: Run the test suite
    run: cd $PROJECT_ROOT && make test
    timeout: 5
    on-fail:
      goto: implement
      max: 10

  - name: review
    type: agent
    description: Review the implementation against the plan
    prompt: .orc/phases/review.md
    timeout: 15
    outputs:
      - review-findings.md

  - name: review-check
    type: script
    description: Check if review passed
    run: test -f $ARTIFACTS_DIR/review-pass.txt || { cat $ARTIFACTS_DIR/review-findings.md 2>/dev/null; exit 1; }
    timeout: 1
    on-fail:
      goto: implement
      max: 2

  - name: commit
    type: script
    description: Stage and commit the changes
    run: |
      cd $PROJECT_ROOT
      git add -A
      git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
      git commit -m "$(cat <<EOF
      $TICKET: $(head -1 $ARTIFACTS_DIR/plan.md | sed 's/^#* *//')

      Co-Authored-By: orc <noreply@jorgebarreto.dev>
      EOF
      )"
    timeout: 1

  - name: bead-close
    type: script
    description: Close the ticket's bead after successful commit
    run: |
      bd search "$TICKET" | grep " - $TICKET:" | head -1 | cut -d' ' -f1 | xargs -r -I{} bd close {}
      exit 0
    timeout: 1
