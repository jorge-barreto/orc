name: orc
ticket-pattern: 'R-\d+|orc-.+?'
model: opus
effort: high

default-allow-tools:
  - Bash
  - Task

phases:
  - name: bead-claim
    type: script
    description: Mark the ticket's bead as in-progress
    run: .orc/scripts/bead-claim.sh
    timeout: 1

  - name: plan
    type: agent
    description: Read the work item and produce an implementation plan
    prompt: .orc/phases/plan.md
    timeout: 15
    outputs:
      - plan.md

  - name: review-plan
    type: agent
    description: Review the plan for completeness and correctness
    prompt: .orc/phases/review-plan.md
    timeout: 10
    outputs:
      - plan-review.md
    loop:
      goto: plan
      max: 3
      check: test -f $ARTIFACTS_DIR/plan-approved.txt

  - name: create-beads
    type: agent
    description: Decompose the plan into ordered child beads
    prompt: .orc/phases/create-beads.md
    model: sonnet
    timeout: 5
    allow-tools:
      - Bash
      - Read
    outputs:
      - bead-ids.txt

  # ── Bead Implementation Loop ─────────────────────────────

  - name: pick-bead
    type: script
    description: Select the next ready bead
    run: .orc/scripts/pick-bead.sh
    timeout: 1

  - name: plan-bead
    type: agent
    description: Write a focused implementation plan for the current bead
    prompt: .orc/phases/plan-bead.md
    model: sonnet
    timeout: 10
    outputs:
      - bead-plan.md

  - name: implement
    type: agent
    description: Implement changes for the current bead
    prompt: .orc/phases/implement.md
    model: sonnet
    timeout: 30

  - name: auto-fix
    type: script
    description: Run gofmt on all Go files
    run: .orc/scripts/auto-fix.sh
    timeout: 2

  - name: build
    type: script
    description: Verify compilation and vet checks
    run: cd $PROJECT_ROOT && make build && go vet ./...
    timeout: 2
    loop:
      goto: implement
      max: 3

  - name: test
    type: script
    description: Run the full test suite
    run: cd $PROJECT_ROOT && make test
    timeout: 5
    loop:
      goto: implement
      max: 5

  - name: quick-review
    type: agent
    description: Fast review — plan compliance and obvious bugs
    prompt: .orc/phases/quick-review.md
    model: sonnet
    timeout: 10
    outputs:
      - quick-review-findings.md
    loop:
      goto: implement
      max: 2
      check: test -f $ARTIFACTS_DIR/quick-review-pass.txt

  - name: wrap-up
    type: agent
    description: Commit changes, close bead, note discovered issues
    prompt: .orc/phases/wrap-up.md
    model: sonnet
    timeout: 5

  - name: check-remaining
    type: script
    description: Loop back if incomplete beads remain
    run: .orc/scripts/check-remaining.sh
    loop:
      goto: pick-bead
      max: 10

  # ── Post-Loop Final Review ───────────────────────────────

  - name: deep-review
    type: agent
    description: Thorough review — correctness, edge cases, conventions
    prompt: .orc/phases/deep-review.md
    timeout: 15
    outputs:
      - review-findings.md
    allow-tools:
      - Agent
    loop:
      goto: plan
      max: 10
      check: test -f $ARTIFACTS_DIR/deep-review-pass.txt

  - name: summary
    type: script
    description: Generate a run summary report
    run: .orc/scripts/summary.sh
    timeout: 1

  - name: bead-close
    type: script
    description: Close the parent bead after all work is complete
    run: .orc/scripts/bead-close.sh
    timeout: 1

  - name: check-backlog
    type: script
    description: Loop back to work the next backlog item if any remain
    run: .orc/scripts/check-backlog.sh
    loop:
      goto: bead-claim
      max: 40

  # ── Wave Wrap-Up (only in wave mode) ───────────────────

  - name: wave-review
    type: agent
    description: Holistic review of all wave changes
    prompt: .orc/phases/wave-review.md
    timeout: 15
    condition: '[ "$(cat "$ORC_ARTIFACTS_DIR/run-mode.txt" 2>/dev/null)" = "wave" ]'
    outputs:
      - wave-review-findings.md
    allow-tools:
      - Agent

  - name: triage
    type: agent
    description: Triage wave review findings into beads
    prompt: .orc/phases/triage.md
    model: sonnet
    timeout: 10
    condition: '[ "$(cat "$ORC_ARTIFACTS_DIR/run-mode.txt" 2>/dev/null)" = "wave" ]'
    outputs:
      - triage-results.md
    loop:
      goto: bead-claim
      max: 5
      check: test "$(bd ready $ORC_TICKET --json | jq -r '.total')" -eq 0

  - name: wave-summary
    type: script
    description: Final wave summary report
    run: .orc/scripts/wave-summary.sh
    timeout: 1
    condition: '[ "$(cat "$ORC_ARTIFACTS_DIR/run-mode.txt" 2>/dev/null)" = "wave" ]'
